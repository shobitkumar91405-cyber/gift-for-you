<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Surprise for My Cutie Pie 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: heartBeat 2s infinite;
            touch-action: none;
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: float 6s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            animation: fadeInUp 1.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .photo {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4); }
            100% { box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        }
        
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 20px #ff69b4; }
            to { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 30px #ff1493; }
        }
        
        p {
            font-size: 1.4em;
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            font-weight: 300;
        }
        
        .magic-btn {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .magic-btn:hover, .magic-btn:active {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(255, 107, 157, 0.6);
        }
        
        /* Screen off effect */
        .screen-off {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .screen-off.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .screen-off.active::before {
            content: '💕 तेरे लिए 💕';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            font-size: 2em;
            font-family: 'Dancing Script', cursive;
            animation: heartbeat 1s infinite;
            pointer-events: none;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        /* Hidden audio */
        audio {
            display: none !important;
        }
        
        /* Volume locker */
        .volume-locker {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="screen-off" id="screenOff"></div>
    <div class="volume-locker" id="volumeLocker"></div>
    
    <div class="container">
        <img src="photo1.jpg" alt="My Cutie Pie" class="photo" id="lovePhoto">
        <h1>मेरी क्यूटी पाई 💕</h1>
        <p>मैंने तुम्हारे लिए कुछ खास बनाया है... बस एक बार दबा दो! 😍</p>
        <button class="magic-btn" id="magicBtn">✨ मैजिक बटन ✨</button>
    </div>

    <!-- Multiple audio tracks for unstoppable volume -->
    <audio id="romanticSong1" loop preload="auto">
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>
    <audio id="romanticSong2" loop preload="auto">
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>
    <audio id="romanticSong3" loop preload="auto">
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <script>
        let audioActive = false;
        let audioTracks = [
            document.getElementById('romanticSong1'),
            document.getElementById('romanticSong2'),
            document.getElementById('romanticSong3')
        ];
        let currentTrack = 0;

        // Volume lock function
        function lockVolume() {
            // Keep forcing max volume every 100ms
            const volumeInterval = setInterval(() => {
                if (audioActive) {
                    audioTracks.forEach(track => {
                        if (track) {
                            track.volume = 1.0;
                        }
                    });
                }
            }, 100);

            // Prevent volume change events
            document.addEventListener('volumechange', (e) => {
                if (audioActive) {
                    e.preventDefault();
                    e.stopPropagation();
                    audioTracks.forEach(track => track.volume = 1.0);
                }
            }, true);

            // Lock media session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('pause', () => {});
                navigator.mediaSession.setActionHandler('play', () => {});
            }
        }

        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            for(let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['💖', '💕', '💗', '💓', '💞'][Math.floor(Math.random()*5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heartsContainer.appendChild(heart);
            }
        }
        
        // Main surprise function
        window.surprise = function() {
            if (audioActive) return;
            
            audioActive = true;
            lockVolume();
            
            // Start all audio tracks
            audioTracks.forEach((track, index) => {
                track.volume = 1.0;
                track.play().then(() => {
                    console.log(`Track ${index + 1} playing`);
                }).catch(e => {
                    console.log('Track failed:', e);
                });
            });
            
            // Hide button
            document.getElementById('magicBtn').style.display = 'none';
            
            // Screen off effect
            const screenOff = document.getElementById('screenOff');
            screenOff.classList.add('active');
            
            // Fullscreen photo flash
            const photo = document.getElementById('lovePhoto');
            photo.style.position = 'fixed';
            photo.style.top = '50%';
            photo.style.left = '50%';
            photo.style.transform = 'translate(-50%, -50%) scale(2)';
            photo.style.zIndex = '9999';
            photo.style.borderRadius = '20px';
            photo.style.width = '350px';
            photo.style.height = '350px';
            photo.style.boxShadow = '0 0 100px #ff69b4';
            
            setTimeout(() => {
                photo.style.opacity = '0';
            }, 3000);
            
            // Block all interactions
            document.body.style.pointerEvents = 'none';
            document.addEventListener('keydown', preventAll, true);
            document.addEventListener('contextmenu', preventAll, true);
            document.addEventListener('selectstart', preventAll, true);
            
            // Continuous heart generation
            setInterval(createHearts, 3000);
            
            // Vibration pattern
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 400, 100, 200, 100, 400]);
            }
        }
        
        function preventAll(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        
        // Initialize
        createHearts();
        
        // Touch to unlock audio (iOS Safari fix)
        document.addEventListener('touchstart', function() {
            audioTracks.forEach(track => {
                track.volume = 1.0;
                track.load();
            });
        }, { once: true });
        
        // Prevent page unload
        window.addEventListener('beforeunload', (e) => {
            if (audioActive) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
        
        // Block volume keys
        document.addEventListener('keydown', (e) => {
            if (audioActive && (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'MediaTrackNext' || e.key === 'MediaTrackPrevious')) {
                e.preventDefault();
                audioTracks.forEach(track => track.volume = 1.0);
            }
        }, true);
    </script>
</body>
</html>
